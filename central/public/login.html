<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Painel Central · Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-orange-500 flex items-center justify-center mb-3">
        <span class="text-white font-black text-xl">P</span>
      </div>
      <h1 class="text-xl font-black text-white">Painel Central</h1>
      <p class="text-sm text-neutral-500">Suporte · Restaurante PDV</p>
    </div>

    <form id="form-login" class="bg-neutral-900 border border-neutral-800 rounded-3xl p-8 space-y-4">
      <div>
        <label class="text-[10px] font-black uppercase tracking-widest text-neutral-500 block mb-2">E-mail</label>
        <input id="email" type="email" required autocomplete="username"
          class="w-full h-12 px-4 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm outline-none focus:border-orange-500" />
      </div>
      <div>
        <label class="text-[10px] font-black uppercase tracking-widest text-neutral-500 block mb-2">Senha</label>
        <input id="senha" type="password" required autocomplete="current-password"
          class="w-full h-12 px-4 rounded-xl bg-neutral-800 border border-neutral-700 text-white text-sm outline-none focus:border-orange-500" />
      </div>

      <p id="erro" class="text-xs text-red-400 font-bold hidden"></p>

      <button type="submit"
        class="w-full h-12 rounded-xl bg-orange-500 hover:bg-orange-400 text-white font-black text-sm uppercase tracking-widest transition-all active:scale-95">
        Entrar
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('form-login')
    const erro = document.getElementById('erro')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      erro.classList.add('hidden')

      const email = document.getElementById('email').value
      const senha = document.getElementById('senha').value

      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        })
        const dados = await resp.json()

        if (!resp.ok) {
          erro.textContent = dados.error || 'Erro ao entrar'
          erro.classList.remove('hidden')
          return
        }

        localStorage.setItem('central_token', dados.token)
        window.location.href = '/index.html'
      } catch {
        erro.textContent = 'Erro de conexão com o servidor'
        erro.classList.remove('hidden')
      }
    })
  </script>

</body>
</html>
